<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060C1A"/>
      <stop offset="1" stop-color="#0B1A2E"/>
    </linearGradient>
    <linearGradient id="stroke" x1="128" y1="70" x2="128" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#5EF0C6"/>
    </linearGradient>
    <radialGradient id="apexGlow" cx="128" cy="80" r="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EF0C6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5EF0C6" stop-opacity="0"/>
    </radialGradient>
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strokeGlow" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="51.5" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <rect width="256" height="256" rx="52" fill="url(#apexGlow)"/>
  <path d="M76 192 L128 70" stroke="url(#stroke)" stroke-width="17" stroke-linecap="round" filter="url(#strokeGlow)"/>
  <path d="M128 70 L180 192" stroke="url(#stroke)" stroke-width="17" stroke-linecap="round" filter="url(#strokeGlow)"/>
  <path d="M95 148 L161 148" stroke="url(#stroke)" stroke-width="13" stroke-linecap="round" filter="url(#strokeGlow)"/>
  <circle cx="128" cy="70" r="10" fill="#5EF0C6" filter="url(#dotGlow)"/>
  <circle cx="76" cy="192" r="6.5" fill="rgba(94,240,198,0.58)"/>
  <circle cx="180" cy="192" r="6.5" fill="rgba(94,240,198,0.58)"/>
</svg>
